name: Deploy to DEV

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PAC CLI
        run: npm install -g @microsoft/powerplatform-cli

      - name: Pack solution
        run: |
          pac solution pack \
            --zipfile solution.zip \
            --folder src

      - name: Done
        run: echo "Build completed"
